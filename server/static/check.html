<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM系统启动检查</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 24px;
            color: #333;
            text-align: center;
        }
        .status-item {
            display: flex;
            align-items: center;
            padding: 16px;
            margin-bottom: 12px;
            background: #f8f8f8;
            border-radius: 8px;
            transition: all 0.3s;
        }
        .status-item.success {
            background: #f6ffed;
            border: 1px solid #b7eb8f;
        }
        .status-item.error {
            background: #fff2f0;
            border: 1px solid #ffccc7;
        }
        .status-item.pending {
            background: #fffbe6;
            border: 1px solid #ffe58f;
        }
        .status-icon {
            width: 24px;
            height: 24px;
            margin-right: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .status-icon.success { color: #52c41a; }
        .status-icon.error { color: #ff4d4f; }
        .status-icon.pending { color: #faad14; }
        .status-text { flex: 1; }
        .status-title { font-weight: 500; color: #333; }
        .status-desc { font-size: 13px; color: #666; margin-top: 4px; }
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            margin: 8px 4px;
            cursor: pointer;
            border: none;
            font-size: 14px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }
        .btn-secondary:hover {
            background: #e0e0e0;
        }
        .button-group {
            text-align: center;
            margin-top: 24px;
        }
        .alert {
            padding: 16px;
            border-radius: 8px;
            margin-top: 20px;
        }
        .alert-warning {
            background: #fffbe6;
            border: 1px solid #ffe58f;
            color: #d48806;
        }
        .alert-info {
            background: #e6f7ff;
            border: 1px solid #91d5ff;
            color: #1890ff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 CRM系统启动检查</h1>
        
        <div id="statusList">
            <div class="status-item pending" id="apiStatus">
                <div class="status-icon pending" id="apiIcon">⏳</div>
                <div class="status-text">
                    <div class="status-title">检查API服务状态...</div>
                    <div class="status-desc" id="apiDesc">正在连接服务器</div>
                </div>
            </div>
            
            <div class="status-item pending" id="dbStatus">
                <div class="status-icon pending" id="dbIcon">⏳</div>
                <div class="status-text">
                    <div class="status-title">检查数据库连接...</div>
                    <div class="status-desc" id="dbDesc">等待API响应</div>
                </div>
            </div>
            
            <div class="status-item pending" id="dataStatus">
                <div class="status-icon pending" id="dataIcon">⏳</div>
                <div class="status-text">
                    <div class="status-title">检查示例数据...</div>
                    <div class="status-desc" id="dataDesc">等待API响应</div>
                </div>
            </div>
        </div>

        <div class="button-group">
            <button class="btn btn-primary" onclick="runChecks()">🔄 重新检查</button>
            <button class="btn btn-secondary" onclick="openApp()" id="openBtn" disabled>📱 打开CRM系统</button>
        </div>

        <div class="alert alert-warning" id="warningBox" style="display:none">
            <strong>⚠️ 检测到问题</strong>
            <p id="warningText" style="margin-top:8px"></p>
        </div>

        <div class="alert alert-info">
            <strong>💡 提示</strong>
            <ul style="margin-top:8px;padding-left:20px">
                <li>确保后端服务已启动: <code>python server/app.py</code></li>
                <li>如遇问题请查看: <a href="TROUBLESHOOTING.md" style="color:#1890ff">故障排查指南</a></li>
            </ul>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3001';
        let allChecksPassed = false;

        function updateStatus(itemId, iconId, descId, status, title, desc) {
            const item = document.getElementById(itemId);
            const icon = document.getElementById(iconId);
            const descEl = document.getElementById(descId);
            
            item.className = 'status-item ' + status;
            icon.className = 'status-icon ' + status;
            
            if (status === 'success') icon.textContent = '✅';
            else if (status === 'error') icon.textContent = '❌';
            else icon.textContent = '⏳';
            
            item.querySelector('.status-title').textContent = title;
            descEl.textContent = desc;
        }

        async function checkApiHealth() {
            try {
                const response = await fetch(`${API_BASE}/api/health`);
                if (response.ok) {
                    const data = await response.json();
                    updateStatus('apiStatus', 'apiIcon', 'apiDesc', 'success', '✅ API服务正常', `服务器运行中 - ${data.database}`);
                    return true;
                } else {
                    updateStatus('apiStatus', 'apiIcon', 'apiDesc', 'error', '❌ API服务异常', `HTTP ${response.status}`);
                    return false;
                }
            } catch (e) {
                updateStatus('apiStatus', 'apiIcon', 'apiDesc', 'error', '❌ 无法连接到服务器', '请确保后端服务已启动: python server/app.py');
                return false;
            }
        }

        async function checkDatabase() {
            try {
                // 通过API请求测试数据库连接
                const response = await fetch(`${API_BASE}/api/v1/crm/customers`, {
                    headers: {
                        'X-User-Id': 'user-001',
                        'X-User-Role': 'admin'
                    }
                });
                if (response.ok) {
                    updateStatus('dbStatus', 'dbIcon', 'dbDesc', 'success', '✅ 数据库连接正常', 'SQLite数据库工作正常');
                    return true;
                } else {
                    updateStatus('dbStatus', 'dbIcon', 'dbDesc', 'error', '❌ 数据库访问失败', `错误: ${response.status}`);
                    return false;
                }
            } catch (e) {
                updateStatus('dbStatus', 'dbIcon', 'dbDesc', 'error', '❌ 数据库连接失败', e.message);
                return false;
            }
        }

        async function checkSampleData() {
            try {
                const response = await fetch(`${API_BASE}/api/v1/crm/customers`, {
                    headers: {
                        'X-User-Id': 'user-001',
                        'X-User-Role': 'admin'
                    }
                });
                if (response.ok) {
                    const customers = await response.json();
                    if (Array.isArray(customers) && customers.length > 0) {
                        updateStatus('dataStatus', 'dataIcon', 'dataDesc', 'success', '✅ 示例数据完整', `检测到 ${customers.length} 个客户`);
                        return true;
                    } else {
                        updateStatus('dataStatus', 'dataIcon', 'dataDesc', 'error', '❌ 示例数据缺失', '请运行: curl -X POST http://localhost:3001/api/init-db');
                        return false;
                    }
                } else {
                    updateStatus('dataStatus', 'dataIcon', 'dataDesc', 'error', '❌ 数据查询失败', `错误: ${response.status}`);
                    return false;
                }
            } catch (e) {
                updateStatus('dataStatus', 'dataIcon', 'dataDesc', 'error', '❌ 数据检查失败', e.message);
                return false;
            }
        }

        async function runChecks() {
            allChecksPassed = false;
            document.getElementById('openBtn').disabled = true;
            document.getElementById('warningBox').style.display = 'none';
            
            const apiOk = await checkApiHealth();
            const dbOk = await checkDatabase();
            const dataOk = await checkSampleData();
            
            allChecksPassed = apiOk && dbOk && dataOk;
            
            if (allChecksPassed) {
                document.getElementById('openBtn').disabled = false;
            } else {
                // 显示问题提示
                const warnings = [];
                if (!apiOk) warnings.push('后端服务未启动或无法访问');
                if (!dbOk) warnings.push('数据库连接失败');
                if (!dataOk) warnings.push('示例数据缺失,需要初始化');
                
                document.getElementById('warningText').innerHTML = warnings.join('<br>');
                document.getElementById('warningBox').style.display = 'block';
            }
        }

        function openApp() {
            if (allChecksPassed) {
                window.location.href = '/';
            }
        }

        // 页面加载时自动检查
        window.addEventListener('load', () => {
            setTimeout(runChecks, 500);
        });
    </script>
</body>
</html>
